name: Update repo traffic badges

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:
  push:
    branches: [main, master]
    paths:
      - "scripts/update_repo_traffic.py"
      - ".github/workflows/repo-traffic-badges.yml"
      - "docs/metrics/**"

permissions:
  contents: write

jobs:
  traffic:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Update clone/view totals
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python scripts/update_repo_traffic.py

      - name: Commit metrics
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: update repo traffic metrics [skip ci]"
          file_pattern: docs/metrics/traffic.json docs/metrics/traffic-history.md
